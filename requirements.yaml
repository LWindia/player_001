  - path: "artifacts/player001/public/images/intel-bg.png"
    description: "Tactical futuristic dashboard background texture, dark grid, subtle green scanner lines, extremely minimal, military radar aesthetic"
    aspect_ratio: "16:9"
  - path: "artifacts/player001/public/images/arena-texture.png"
    description: "Rough dark concrete texture with very subtle crimson spotlight reflecting off it, grunge, cinematic"
