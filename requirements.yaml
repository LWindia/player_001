packages:
  "framer-motion": "For all cinematic and scroll-triggered animations"
  "react-hook-form": "For robust player registration form handling"
  "@hookform/resolvers": "For Zod validation integration with the form"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility to merge tailwind classes"

images:
