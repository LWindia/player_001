kind = "web"
previewPath = "/"
title = "PLAYER 001"
version = "1.0.0"
id = "artifacts/player001"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23723
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/player001 run dev"

[services.env]
PORT = "23723"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/player001", "run", "build"]
publicDir = "artifacts/player001/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
